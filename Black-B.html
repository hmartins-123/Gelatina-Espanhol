<!-- Black page variation B: "Bienestar Femenino" — solid rose banner + gelatina logo -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienestar Femenino</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Helvetica,sans-serif;background:#fff;color:#111;line-height:1.4}
  .container{max-width:680px;margin:0 auto;padding:0}
  img{max-width:100%;display:block}

  /* Header — Bienestar Femenino */
  .banner{background:#f472a0;padding:14px 16px;border-bottom:3px solid #d94e7f}
  .banner-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:14px}
  .brand{display:flex;align-items:center;gap:12px;flex:1}
  .gel-ic{width:54px;height:54px;border-radius:50%;overflow:hidden;background:#fff;flex-shrink:0;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.18)}
  .gel-ic img{width:100%;height:100%;object-fit:cover}
  .brand-text{color:#fff;font-family:Georgia,serif;letter-spacing:-.01em}
  .brand-text .b1{font-size:1.5rem;font-weight:700;line-height:1;letter-spacing:.02em}
  .brand-text .b2{font-size:.7rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;opacity:.85;margin-top:2px}
  .menu-ic{width:48px;height:48px;border-radius:10px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;backdrop-filter:blur(4px)}
  .menu-ic svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
  @media (max-width:480px){.brand-text .b1{font-size:1.15rem}.brand-text .b2{font-size:.6rem;letter-spacing:.2em}.gel-ic{width:46px;height:46px}.menu-ic{width:42px;height:42px}}

  /* Timer bar */
  .timer-row{padding:18px 20px 14px;display:flex;align-items:center;gap:10px;font-weight:bold;color:#333;font-size:14px;font-family:Arial,sans-serif}
  .timer-row #timer{background:#f3f3f3;border-radius:30px;padding:5px 12px;font-weight:bold;font-family:monospace;color:#000}
  .divider{border:0;border-top:1px solid #838383;margin:0 20px}

  /* Viewer counter */
  .viewer-wrap{padding:22px 14px;text-align:center;background:#fff;font-family:Arial,Helvetica,sans-serif}
  .viewing{font-size:clamp(13px,3.6vw,15px);color:#6b6b6b;line-height:1.3}
  .viewing .n{color:#d32f2f;font-weight:700;margin-right:6px;display:inline-block;min-width:32px}

  /* VSL */
  .vsl-wrap{padding:16px 12px 24px}
  vturb-smartplayer{display:block;margin:0 auto;width:100%;max-width:640px;border-radius:10px;overflow:hidden}

  /* Expert — Editorial frame style */
  .expert{padding:32px 20px 40px;text-align:center;background:linear-gradient(180deg,#fff,#fff8f5)}
  .expert-frame{display:inline-block;position:relative;padding:12px;background:#fff;border-radius:20px;box-shadow:0 10px 30px rgba(244,114,160,.2);border:1px solid #f3d9e2}
  .expert-frame img{width:100%;max-width:300px;border-radius:12px}
  .expert .name{font-family:Georgia,serif;font-size:1.2rem;color:#2d1810;font-weight:700;margin-top:16px}
  .expert .cred{font-size:.8rem;color:#d94e7f;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;font-weight:600}
</style>
</head>
<body>

<header class="banner">
  <div class="banner-inner">
    <div class="brand">
      <div class="gel-ic"><img src="Gelatina%20imagem.webp" alt=""></div>
      <div class="brand-text">
        <div class="b1">Bienestar Femenino</div>
        <div class="b2">Salud · Mujer 30+</div>
      </div>
    </div>
    <div class="menu-ic" aria-label="Menú">
      <svg viewBox="0 0 24 24"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </div>
  </div>
</header>

<main class="container">

  <div class="timer-row">
    <span>ESTE VIDEO YA NO ESTÁ DISPONIBLE</span>
    <span id="timer">55:00</span>
  </div>
  <hr class="divider">

  <div class="viewer-wrap">
    <div class="viewing"><span class="n" id="viewerCount">596</span>personas están viendo esto ahora.</div>
  </div>

  <div class="vsl-wrap">
    <vturb-smartplayer id="ab-69e67f6ea8ce2d72e1d2aebf" style="display:block;margin:0 auto;width:100%;"></vturb-smartplayer>
  </div>

  <section class="expert">
    <div class="expert-frame">
      <img src="Imagem-sophia.webp" alt="Sophia">
    </div>
    <div class="name">Sophia</div>
    <div class="cred">Nutrióloga · Mujer 30+</div>
  </section>

</main>

<script>
  let time = 55 * 60;
  const timerEl = document.getElementById('timer');
  function updateTimer(){
    const m = Math.floor(time/60), s = time%60;
    timerEl.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    if (time > 0) time--;
  }
  updateTimer();
  setInterval(updateTimer, 1000);

  const vEl = document.getElementById('viewerCount');
  let cur = parseInt(vEl.textContent,10) || 596;
  const randInt = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
  function tickV(){ cur += randInt(1,4); vEl.textContent = cur; setTimeout(tickV, randInt(1200,3200)); }
  setTimeout(tickV, randInt(800,1600));
</script>

<script type="text/javascript">
  var s=document.createElement("script");
  s.src="https://scripts.converteai.net/1931009e-87e8-44a9-862f-c0f557162b5e/ab-test/69e67f6ea8ce2d72e1d2aebf/player.js";
  s.async=!0;
  document.head.appendChild(s);
</script>

</body>
</html>
